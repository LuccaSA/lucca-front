@if (layout === 'fieldset') {
<fieldset class="form-fieldset" [class.mod-S]="size === 'S'">
	<legend class="formLabel" [class.u-mask]="hiddenLabel" attr.aria-hidden="{{hiddenLabel}}">
		<ng-container *luPortal="label"></ng-container
		><!--
        -->@if (required) {
		<sup class="formLabel-required" aria-hidden="true">*</sup>
		} @if (tooltip) {
		<lu-icon class="formLabel-info" icon="signHelp" [alt]="'?'" [luTooltip]="tooltip" [color]="invalid ? 'error' : 'inherit'"></lu-icon>
		}
	</legend>
	<ng-container *ngTemplateOutlet="projectionTpl"></ng-container>
	@if (inlineMessage || (invalid ? errorInlineMessage : false)) {
	<lu-inline-message
		id="{{id}}-message"
		[label]="(invalid && errorInlineMessage) ? errorInlineMessage : inlineMessage"
		[state]="invalid ? 'error' : inlineMessageState"
	></lu-inline-message>
	}
</fieldset>
} @else {
<label
	class="formLabel"
	[class.is-error]="invalid"
	[class.mod-counter]="counter > 0"
	id="{{id}}-label"
	for="{{id}}"
	[class.u-mask]="hiddenLabel"
	attr.role="{{rolePresentationLabel ? 'presentation' : null}}"
>
	<ng-container *luPortal="label"></ng-container
	><!--
      -->@if (required) {
	<sup class="formLabel-required" aria-hidden="true">*</sup>
	} @if (tooltip) {
	<lu-icon class="formLabel-info" icon="signHelp" [alt]="'?'" [luTooltip]="tooltip" [color]="invalid ? 'error' : 'inherit'"></lu-icon>
	} @if (counter > 0) {
	<span class="formLabel-counter" [class.u-textError]="contentLength > counter" id="{{id}}-counter" aria-live="polite">
		<span aria-hidden="true">{{ contentLength }}/{{ counter }}</span>
		<span class="u-mask">{{ intl.counter | intlParams: { current: contentLength, max: counter } }}</span>
	</span>
	}
</label>
<ng-container *ngTemplateOutlet="projectionTpl"></ng-container>
@if (inlineMessage || (invalid ? errorInlineMessage : false)) {
<lu-inline-message
	id="{{id}}-message"
	[label]="(invalid && errorInlineMessage) ? errorInlineMessage : inlineMessage"
	[state]="invalid ? 'error' : inlineMessageState"
></lu-inline-message>
} }

<ng-template #projectionTpl>
	<ng-content></ng-content>
</ng-template>
