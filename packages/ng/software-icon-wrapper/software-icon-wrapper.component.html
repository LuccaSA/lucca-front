<div
	class="softwareIconWrapper"
	[class.mod-XXS]="size() === 'XXS'"
	[class.mod-XS]="size() === 'XS'"
	[class.mod-S]="size() === 'S'"
	[class.mod-L]="size() === 'L'"
>
	<ul class="pr-u-displayContents">
		<ng-content />
	</ul>

	@if (hiddenCount() > 0) {
		<button class="softwareIconWrapper-action" type="button" [luPopover2]="softwareIconWrapperHiddenItem" luPopoverTrigger="hover+focus">
			<svg
				class="softwareIconWrapper-action-illustration"
				viewBox="0 0 48 48"
				fill="none"
				xmlns="http://www.w3.org/2000/svg"
				paint-order="stroke"
				aria-hidden="true"
			>
				<path
					d="M47.6677 25.9005C43.138 55.002 18.7131 49.2779 9.33095 42.5981C-0.0511509 35.9202 -8.30233 13.9734 15.8 3.00001C37.6385 -6.86008 50.2542 9.36062 47.6657 25.9005"
					fill="var(--palettes-neutral-200)"
				/>
			</svg>
			<div class="softwareIconWrapper-action-more">
				<span aria-hidden="true" [attr.data-content-before]="'+' + hiddenIcons().length"></span>
				<span class="pr-u-mask">{{ intl().seeMore | intlParams: { count: hiddenIcons().length } }}</span>
			</div>
		</button>

		<ng-template #softwareIconWrapperHiddenItem>
			<div class="popover-contentOptional">
				@for (icon of hiddenIcons(); track icon) {
					<div class="">
						<lu-software-icon class="pr-u-displayBlock" [icon]="icon.icon()" [size]="icon.size() ?? size()" [disabled]="icon.disabled()" />
					</div>
				}
			</div>
		</ng-template>
	}
</div>
