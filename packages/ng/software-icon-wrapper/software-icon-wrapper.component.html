<ul class="softwareIconWrapper-list">
	@for (icon of visibleIcons(); track icon) {
		<li class="softwareIconWrapper-list-item">
			<ng-container [ngTemplateOutlet]="icon" />
		</li>
	}
</ul>

@if (hiddenCount() >= 2) {
	<button class="softwareIconWrapper-action" type="button" [luPopover2]="softwareIconWrapperPopover" luPopoverTrigger="click+hover">
		<div class="softwareIconWrapper-action-more">
			<span aria-hidden="true" [attr.data-content-before]="'+' + hiddenIcons().length"></span>
			<span class="pr-u-mask">{{ intl().seeMore | intlParams: { count: hiddenIcons().length } }}</span>
		</div>
	</button>

	<ng-template #softwareIconWrapperPopover>
		<ul class="popover-contentOptional softwareIconWrapper_popover" [class]="size() ? `mod-${size()}` : null">
			@for (icon of hiddenIcons(); track icon) {
				<li class="softwareIconWrapper_popover-item">
					<ng-container [ngTemplateOutlet]="icon" />
				</li>
			}
		</ul>
	</ng-template>
}
