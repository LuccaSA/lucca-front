<ul
	class="softwareIconWrapper"
	[class.mod-XXS]="size() === 'XXS'"
	[class.mod-XS]="size() === 'XS'"
	[class.mod-S]="size() === 'S'"
	[class.mod-L]="size() === 'L'"
>
	<ng-content />

	@if (hiddenCount() > 0) {
		<li class="softwareIconWrapper-item" role="presentation">
			<button type="button" [luPopover2]="softwareIconWrapperHiddenItem" luPopoverTrigger="hover+focus">
				<span class="softwareIconWrapper-item-action-more">
					<span aria-hidden="true" [attr.data-content-before]="'+' + hiddenIcons().length"></span>
					<span class="pr-u-mask">{{ intl().seeMore | intlParams: { count: hiddenIcons().length } }}</span>
				</span>
			</button>

			<ng-template #softwareIconWrapperHiddenItem>
				<div class="popover-contentOptional">
					@for (icon of hiddenIcons(); track icon) {
						<lu-software-icon [icon]="icon.icon()" [size]="icon.size() ?? size()" [disabled]="icon.disabled()" />
					}
				</div>
			</ng-template>
		</li>
	}
</ul>
