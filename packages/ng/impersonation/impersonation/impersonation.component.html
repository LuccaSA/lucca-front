<button
	type="button"
	class="impersonation-trigger"
	[class.is-active]="false"
	[luPopover2]="impersonationPopover"
	[luPopoverNoCloseButton]="true"
	[customPositions]="popoverPositions"
	[luPopoverAnchor]="elementRef"
	#popoverRef="luPopover2"
	[attr.aria-expanded]="popoverRef.opened()"
	(keydown.arrowDown)="$event.preventDefault(); popoverRef.openPopover(true)"
	(keydown.arrowUp)="$event.preventDefault(); popoverRef.openPopover(true)"
>
	<span class="pr-u-mask">Changer de profil :</span>
	@let user = selectedUser();
	@if (user) {
		<lu-user-picture aria-hidden="true" [user]="user" size="S" notFullRounded />
		{{ user | luUserDisplay }}
	}
	<span class="pr-u-mask">– Le contenu de la page s’actualise dès que ce filtre est modifié</span>
	<lu-icon class="impersonation-trigger-icon" icon="chevronBottom" />
</button>
<lu-clear class="impersonation-clear" />

<ng-template #impersonationPopover>
	<div class="impersonation_popover-content popover-contentOptional">
		<lu-simple-select [(ngModel)]="selectedUser" users #selectRef>
			<ng-container *luOption="let user; select: selectRef">
				<div class="impersonation_popover-content-option">
					<lu-user-picture aria-hidden="true" [user]="user" size="XS" notFullRounded />
					<span translate="no">{{ user | luUserDisplay }}</span>
					<!-- Handle homonyms -->
					@if (user.additionalInformation) {
						<span> ({{ user.additionalInformation }})</span>
					}
				</div>
			</ng-container>
		</lu-simple-select>
	</div>
</ng-template>
