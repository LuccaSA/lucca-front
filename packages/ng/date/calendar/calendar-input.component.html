<section class="calendar">
	<header class="calendar-header">
		<button (click)="previous()" class="button mod-onlyIcon mod-text mod-S" type="button">
			<span aria-hidden="true" class="lucca-icon icon-arrowChevronLeft"></span>
			<span class="u-mask">Previous</span>
		</button>
		<button (click)="increaseGranularity()" class="calendar-header-date" type="button">{{ header.label }}</button>
		<button (click)="next()" class="button mod-onlyIcon mod-text mod-S" type="button">
			<span aria-hidden="true" class="lucca-icon icon-arrowChevronRight"></span>
			<span class="u-mask">Next</span>
		</button>
	</header>
	<section [ngClass]="mod" class="calendar-labels">
		@for (label of labels; track label) {
		<div class="calendar-labels-item">{{ label }}</div>
		}
	</section>
	<section [ngClass]="mod" class="calendar-grid">
		@for (item of items; track item.id) {
		<button type="button" class="calendar-grid-item" [ngClass]="item.mods" [disabled]="item.isDisabled" (click)="select(item)">
			<div class="calendar-grid-item-content">{{ item.label }}</div>
		</button>
		}
	</section>
</section>
