@if (container()) {
	<footer class="footer" [class.dialog-inside-footer]="dialog()" [class.mod-sticky]="sticky()" [class]="breakpointClass()">
		<div
			class="footer-containerOptional"
			[class.mod-containerMaxXXXL]="containerMax() === 'XXXL'"
			[class.mod-containerMaxXXL]="containerMax() === 'XXL'"
			[class.mod-containerMaxXL]="containerMax() === 'XL'"
			[class.mod-containerMaxL]="containerMax() === 'L'"
			[class.mod-containerMaxM]="containerMax() === 'M'"
		>
			<ng-container *ngTemplateOutlet="footerContent" />
		</div>
	</footer>
} @else {
	<footer class="footer" [class.dialog-inside-footer]="dialog()" [class.mod-sticky]="sticky()" [class]="breakpointClass()">
		<ng-container *ngTemplateOutlet="footerContent" />
	</footer>
}

<ng-template #footerContent>
	<div class="footer-content"><ng-content select="[footerContent]" /></div>
	<div class="footer-actions"><ng-content /></div>
</ng-template>
