@if (container()) {
	<footer class="footer" [class.dialog-inside-footer]="dialog()" [class.mod-sticky]="sticky()" [class]="breakpointClass()">
		<lu-container [max]="containerMax()" class="footer-containerOptional">
			<ng-container *ngTemplateOutlet="footerContent" />
		</lu-container>
	</footer>
} @else {
	<footer class="footer" [class.dialog-inside-footer]="dialog()" [class.mod-sticky]="sticky()" [class]="breakpointClass()">
		<ng-container *ngTemplateOutlet="footerContent" />
	</footer>
}

<ng-template #footerContent>
	<div class="footer-content"><ng-content select="[footerContent]" /></div>
	<div class="footer-actions"><ng-content /></div>
</ng-template>
