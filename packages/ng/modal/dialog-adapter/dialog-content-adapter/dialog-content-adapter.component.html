<lu-dialog>
	<lu-dialog-header><h1>{{ title$ | async }}</h1></lu-dialog-header>
	<lu-dialog-content>
		<ng-container #contentProjectionRef></ng-container>
	</lu-dialog-content>
	<lu-dialog-footer>
		<div class="footer-actions">
			@if (hasSubmit$ | async) {
			<button
				luButton
				type="button"
				[palette]="submitPalette"
				[disabled]="submitDisabled$ | async"
				[ngClass]="submitClass()"
				(click)="submit()"
			>
				{{ submitLabel$ | async }} @if (hasSubmitCounter$ | async) {
				<lu-numeric-badge palette="product" [value]="submitCounter$ | async"></lu-numeric-badge>
				}
			</button>
			}
			<button (click)="dismiss()" class="button mod-text" luButton type="button">{{ cancelLabel$ | async }}</button>
		</div>
	</lu-dialog-footer>
</lu-dialog>
