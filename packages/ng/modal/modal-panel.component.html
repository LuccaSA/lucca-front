<div
	[attr.aria-labelledby]="'luModalTitle' + modalId"
	[ngClass]="modalClasses.panelInner"
	aria-modal="true"
	cdkTrapFocus="true"
	cdkTrapFocusAutoCapture="true"
	role="dialog"
>
	<div [ngClass]="modalClasses.panelContainer" role="document">
		<div cdkFocusInitial class="lu-modal-header" tabindex="-1">
			<button (click)="dismiss()" [luTooltip]="closeLabel" class="button mod-onlyIcon mod-text mod-S lu-modal-header-close" type="button">
				<span aria-hidden="true" class="lucca-icon icon-signClose"></span>
				<span class="u-mask">{{ closeLabel }}</span>
			</button>
			<h1 [attr.id]="'luModalTitle' + modalId" class="lu-modal-header-title">{{ title$ | async }}</h1>
		</div>
		<div class="lu-modal-content">
			<ng-container #container></ng-container>
		</div>
		<div class="lu-modal-footer">
			@if (!isSubmitHidden) {
			<button
				type="button"
				class="button palette-{{ submitPalette }}"
				[disabled]="submitDisabled$ | async"
				[ngClass]="submitClass$ | async"
				(click)="submit()"
			>
				{{ submitLabel$ | async }} @if (hasSubmitCounter$ | async) {
				<label class="numericBadge palette-product">{{ submitCounter$ | async }}</label>
				}
			</button>
			}
			<button (click)="dismiss()" class="button mod-text" type="button">{{ cancelLabel$ | async }}</button>
		</div>
	</div>
</div>
