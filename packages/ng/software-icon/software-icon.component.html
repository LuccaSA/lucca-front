<div
	class="softwareIcon"
	[class.pr-u-displayNone]="hidden()"
	[class.is-disabled]="disabled()"
	[class.mod-XXS]="_size() === 'XXS'"
	[class.mod-XS]="_size() === 'XS'"
	[class.mod-S]="_size() === 'S'"
	[class.mod-L]="_size() === 'L'"
	aria-hidden="true"
	[innerHtml]="iconUrl() | luSafeExternalSvg"
></div>
<span class="pr-u-mask">{{ icon() }}</span>
