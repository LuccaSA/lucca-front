<dl class="highlightData-content">
	<dt class="highlightData-content-title"><ng-container *luPortal="heading()" /></dt>
	<dd class="highlightData-content-value"><ng-container *luPortal="value()" /></dd>
	@if (subText()) {
		<dd class="highlightData-content-subText"><ng-container *luPortal="subText()" /></dd>
	}
	<dd class="highlightData-content-action"><ng-content /></dd>
</dl>

@if (bubble() || illustration()) {
	<div class="highlightData-illustrations">
		@if (bubble()) {
			<div class="highlightData-illustrations-back" aria-hidden="true" [innerHtml]="bubbleSrc() | luSafeExternalSvg"></div>
		}
		@if (illustration()) {
			<div class="highlightData-illustrations-front" aria-hidden="true" [innerHtml]="illustrationSrc() | luSafeExternalSvg"></div>
		}
	</div>
}
