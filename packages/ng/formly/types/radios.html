<legend class="radiosfield-label">{{ props.label }}</legend>
<div class="radiosfield-input">
	@for (option of _options; track option.value; let i = $index) {
	<label class="radio">
		<input
			class="radio-input"
			type="radio"
			[name]="props['name']"
			[value]="option.value"
			[id]="id + '_'+ i"
			[formControl]="formControl"
			[formlyAttributes]="field"
		/>
		<span class="radio-label">{{ option.label }}</span>
	</label>
	}
</div>
