<lu-select
	(blur)="blur()"
	(focus)="focus()"
	[formControl]="formControl"
	[formlyAttributes]="field"
	[multiple]="props['multiple']"
	[placeholder]="props.placeholder"
	class="textfield-input"
>
	<ng-container *luDisplayer="let option">
		<span [class.chip]="props['multiple']" [class.mod-unkillable]="props['multiple']">{{ option.name }}</span>
	</ng-container>
	<lu-option-picker>
		@for (option of _options; track option.value) {
		<lu-option [value]="option"> {{ option.name }}</lu-option>
		}
	</lu-option-picker>
	@if (!props.required && !props['multiple']) {
	<lu-input-clearer></lu-input-clearer>
	}
</lu-select>
<span class="textfield-label">{{ props.label }}</span>
