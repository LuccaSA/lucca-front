<div class="approbationInbox-list-item">
	@if (selectable()) {
		<div class="form-field approbationInbox-list-item-formfieldOptional">
			<label class="formLabel pr-u-mask" for="ID">Sélectionner…</label>
			<span class="checkboxField">
				<input type="checkbox" class="checkboxField-input" id="ID" />
				<span class="checkboxField-icon" aria-hidden="true"><span class="checkboxField-icon-check"></span></span>
			</span>
		</div>
	}
	<div class="approbationInbox-list-item-content">
		<div class="approbationInbox-list-item-content-info" [class.mod-center]="center()">
			<div class="approbationInbox-list-item-content-info-start"><ng-content select="[approbationInboxListItemStart]" /></div>
			<div class="approbationInbox-list-item-content-info-main">
				<ng-content />
			</div>
			<div class="approbationInbox-list-item-content-info-end"><ng-content select="[approbationInboxListItemEnd]" /></div>
		</div>
	</div>
</div>
