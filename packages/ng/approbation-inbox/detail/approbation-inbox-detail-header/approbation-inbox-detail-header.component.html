<div class="approbationInbox-detail-header-start">
	<ng-content select="[approbationInboxDetailIllustration]" />
</div>
<div class="approbationInbox-detail-header-main">
	<div class="approbationInbox-detail-header-main-infos">
		<h1 class="approbationInbox-detail-header-main-infos-title" [id]="titleId">
			<span class="approbationInbox-detail-header-main-infos-title-content" luTooltip luTooltipWhenEllipsis>{{ label() }}</span>
		</h1>
		<div class="approbationInbox-detail-header-main-infos-description">
			<ng-content />
		</div>
		@if (delegation()) {
			<div class="approbationInbox-detail-header-main-delegation">
				<lu-tag withEllipsis [label]="delegation()" />
			</div>
		}
	</div>
	<div class="approbationInbox-detail-header-main-actions">
		<ng-content select="[approbationInboxDetailActions]" />
		<span class="approbationInbox-detail-header-main-actions-more">
			<ng-content select="[approbationInboxDetailActionsMore]" />
		</span>
	</div>
</div>
