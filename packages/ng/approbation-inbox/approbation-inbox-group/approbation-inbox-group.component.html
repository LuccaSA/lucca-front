<div class="approbationInbox-list-groupOptional">
	<div class="approbationInbox-list-groupOptional-header">
		@if (selectable()) {
			<lu-form-field label="Sélectionner…" hiddenLabel class="approbationInbox-list-groupOptional-header-formfieldOptional">
				<lu-checkbox-input
					[ngModel]="allChecked()"
					[ngModelOptions]="{ standalone: true }"
					[mixed]="groupMixed()"
					(ngModelChange)="onGroupChange($event)"
				/>
			</lu-form-field>
		}
		<button
			type="button"
			[attr.aria-expanded]="expanded()"
			(click)="expandedToggle()"
			class="approbationInbox-list-groupOptional-header-action"
		>
			<lu-icon icon="arrowChevronBottom" size="XS" class="approbationInbox-list-groupOptional-header-action-icon" />
			{{ label() }}
		</button>
	</div>
	<div class="approbationInbox-list-groupOptional-content">
		<ng-content />
	</div>
</div>
