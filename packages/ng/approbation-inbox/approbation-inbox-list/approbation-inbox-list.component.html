<header class="approbationInbox-list-header">
	<h1 class="approbationInbox-list-header-title"><ng-container *luPortal="label()" /></h1>
	<div class="approbationInbox-list-header-filterBar">
		<ng-content select="[approbationInboxListFilterBar]" />
	</div>
</header>
<div class="approbationInbox-list-content">
	@if (selectable()) {
		<lu-form-field label="Tout sélectionner" class="approbationInbox-list-item-formfieldOptional">
			<lu-checkbox-input [ngModel]="selectAllState() === true" [mixed]="selectAllState() === 'mixed'" (ngModelChange)="toggleSelectAll()" />
		</lu-form-field>
		<lu-divider />
	}
	<ng-content />
</div>
