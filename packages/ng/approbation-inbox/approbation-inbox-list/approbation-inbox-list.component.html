<form class="approbationInbox-list-form" (submit)="submit()" (reset)="reset()">
	<header class="approbationInbox-list-header">
		<h1 class="approbationInbox-list-header-title" [id]="titleId"><ng-container *luPortal="label()" /></h1>
		<div class="approbationInbox-list-header-filterBar">
			<ng-content select="[approbationInboxListFilterBar]" />
		</div>
	</header>
	<div class="approbationInbox-list-content">
		@if (selectable() && !empty()) {
			<lu-form-field label="Tout sélectionner" class="approbationInbox-list-formfieldOptional">
				<lu-checkbox-input
					[ngModel]="selectAllState() === true"
					[ngModelOptions]="{ standalone: true }"
					[mixed]="selectAllState() === 'mixed'"
					(ngModelChange)="toggleSelectAll()"
				/>
			</lu-form-field>
			<lu-divider />
		}
		<ng-content />
		@if (empty()) {
			<div class="approbationInbox-list-content-empty">
				<!-- TODO inbox -->
				<lu-bubble-illustration [illustration]="emptyIllustration()" />
				<p>{{ emptyLabel() }}</p>
				@if (emptyResetLabel()) {
					<button type="reset" luButton="outlined">{{ emptyResetLabel() }}</button>
				}
			</div>
		}
	</div>
	@if (checkedCount() > 0) {
		<!-- TODO inbox -->
		<footer class="approbationInbox-list-footer">
			<h2 class="approbationInbox-list-footer-title">{{ checkedCount() }} dépenses sélectionnées</h2>
			<!-- TODO inbox -->
			<button luButton type="submit" block>Approuver les dépenses</button>
			<button luButton="outlined" type="button" block>Transférer les demandes</button>
		</footer>
	}
</form>
