<input
	type="radio"
	class="segmentedControl-item-input"
	[name]="segmentedControlRef.name()"
	[checked]="checked()"
	(change)="onChange()"
	(blur)="onBlur()"
	[attr.id]="id"
	[attr.disabled]="isDisabled() ? 'disabled' : null"
/>
<label [attr.for]="id" class="segmentedControl-item-action">
	<ng-container *luPortal="label()" />
</label>
