<ng-template>
	<div
		(click)="onClick()"
		(mousedown)="onMouseDown()"
		(mouseleave)="onMouseLeave()"
		(mouseover)="onMouseOver()"
		[class.mod-multiple]="multiple"
		[ngClass]="panelClassesMap"
		class="lu-picker-panel lu-option-picker-panel"
		role="dialog"
	>
		<div
			(onScrollBottom)="onScrollBottom()"
			[cdkTrapFocus]="trapFocus"
			[class.is-loading]="loading$ | async"
			[ngClass]="contentClassesMap"
			class="lu-picker-content"
			luScroll
		>
			<ng-content></ng-content>
			@if (loading$ | async) {
			<div class="loading lu-picker-loading"></div>
			}
		</div>
	</div>
</ng-template>
