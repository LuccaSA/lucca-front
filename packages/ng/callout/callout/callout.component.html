@if (!removedRef()) {
	<div class="callout" [class]="calloutClasses()" [class.mod-AI]="AI()">
		@if (state() | luCalloutIcon: icon(); as calloutIcon) {
			<div class="callout-icon">
				<lu-icon [icon]="calloutIcon" [alt]="iconAlt()" />
			</div>
		}
		<div class="callout-content">
			@if (heading()) {
				<p [attr.role]="hx() ? 'heading' : null" [attr.aria-level]="hx() ? hx() : null" class="callout-content-title">
					<ng-container *luPortal="heading()" />
				</p>
			}
			<div class="callout-content-description">
				<ng-content />
			</div>
		</div>
		@if (removable()) {
			<button type="button" class="callout-kill" (click)="removedRef.set(true); removedChange.emit(true)">
				<span class="pr-u-mask">{{ intl().close }}</span>
			</button>
		}
	</div>
}
