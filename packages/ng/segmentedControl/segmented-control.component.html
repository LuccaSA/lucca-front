@if (tabs()) {
	<ul
		class="segmentedControl"
		role="tablist"
		(keydown.arrowleft)="previous()"
		(keydown.arrowup)="previous()"
		(keydown.arrowright)="next()"
		(keydown.arrowdown)="next()"
		[class.mod-S]="small()"
		[class.mod-vertical]="vertical()"
	>
		<li class="segmentedControl-item" role="presentation" *ngFor="let panel of fakePanels; let i = index">
			<button
				class="segmentedControl-item-action"
				type="button"
				role="tab"
				[attr.id]="panel.labelId"
				[attr.aria-controls]="panel.panelId"
				[attr.aria-selected]="active === i"
				[attr.tabindex]="active !== i ? '-1' : null"
				(click)="active = i"
			>
				{{ panel.label }}
			</button>
		</li>
	</ul>
}
<ng-content />
{{ panels() | json }}
