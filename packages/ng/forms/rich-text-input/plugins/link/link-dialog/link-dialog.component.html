<lu-dialog>
	<!-- eslint-disable-next-line @lucca-front/no-deprecated-classes -- .dialog-form is deprecated since LF 18.3.0 (removed in 22.0.0), to be replaced by .dialog-inside-formOptional -->
	<form class="dialog-form" (submit)="save()" [formGroup]="formGroup">
		<lu-dialog-content>
			<lu-form-field [label]="intl().linksHref">
				<lu-text-input formControlName="href" type="url" [placeholder]="intl().linksPlaceholder" />
			</lu-form-field>
		</lu-dialog-content>
		<lu-dialog-footer>
			@if (dialogData.url && dialogData.canDelete) {
				<div class="footer-content">
					<button type="button" luButton="ghost" critical (click)="deleteLink()">{{ intl().linksDelete }}</button>
				</div>
			}
			<div class="footer-actions">
				<button type="submit" luButton>{{ intl().linksSubmit }}</button>
				<button type="button" luButton="ghost" luDialogDismiss>{{ intl().linksCancel }}</button>
			</div>
		</lu-dialog-footer>
	</form>
</lu-dialog>
