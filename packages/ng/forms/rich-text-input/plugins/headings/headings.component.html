<lu-form-field [label]="intl().headingsLabel" size="S" hiddenLabel class="mod-width20">
	<lu-simple-select
		[options]="headingOptions()"
		[value]="heading()"
		(valueChange)="updateHeading($event)"
		[disabled]="disabled()"
		#selectRef
		[inputTabindex]="tabindex()"
	>
		<ng-container *luOption="let heading; select: selectRef">{{ headingLabels()[heading][0] }}</ng-container>
	</lu-simple-select>
</lu-form-field>
