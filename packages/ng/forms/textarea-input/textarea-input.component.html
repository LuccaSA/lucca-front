<div class="textField" [class.mod-autoResize]="autoResize()">
	<div class="textField-input" #parent>
		@if (autoResize()) {
			<div class="textField-input-valueClone" aria-hidden="true" [attr.data-content-before]="value()"></div>
		}
		<textarea
			luInput
			class="textField-input-value"
			[value]="value()"
			[disabled]="disabled()"
			[attr.placeholder]="placeholder()"
			[attr.rows]="rows()"
			(input)="value.set(textarea.value)"
			(blur)="touch.emit()"
			[attr.spellcheck]="!disableSpellcheck()"
			#textarea
		></textarea>
	</div>
</div>

<ng-container *luPresentationDisplayDefault>
	@if (value()) {
		<lu-read-more>
			{{ value() }}
		</lu-read-more>
	} @else {
		<span aria-hidden="true" data-content-before="–"></span>
	}
</ng-container>
