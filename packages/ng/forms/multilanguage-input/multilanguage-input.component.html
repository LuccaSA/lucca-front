<div class="textField mod-multilanguage">
	<!-- TODO invariant -->
	@if (false) {
		<div class="textField-prefix">
			<div class="textField-prefix-lang">
				<!-- TODO required -->
				<!-- TODO locale -->
				@if (true) {
					XX<sup class="formLabel-required" aria-hidden="true">*</sup>
				} @else {
					XX
				}
			</div>
		</div>
	}
	<div class="textField-input">
		<input
			luInput
			type="text"
			class="textField-input-value"
			[placeholder]="placeholder()"
			[(ngModel)]="invariant().value"
			(ngModelChange)="valueChange()"
			[ngModelOptions]="{ standalone: true }"
			(blur)="onTouched?.()"
			(focus)="openOnFocus() ? popoverRef.openPopover(true, true, true) : null"
			[disabled]="disabledInternal()"
			[autocomplete]="autocomplete()"
			#inputElement
		/>
		<div class="textField-input-affix">
			<button
				[luPopover2]="popoverMultilanguage"
				#popoverRef="luPopover2"
				luPopoverNoCloseButton
				[customPositions]="popoverPositions"
				[luTooltip]="intl().toggleMultilanguage"
				luTooltipOnlyForDisplay
				luButton
				type="button"
				class="textField-input-affix-toggle"
			>
				<lu-icon icon="signTranslation" [alt]="intl().toggleMultilanguage" />
			</button>
			<ng-template #popoverMultilanguage>
				<!-- TODO syle width -->
				<div class="popover-contentOptional multilanguage_popover-content" [style.width.px]="inputElement.clientWidth + 72">
					<div class="pr-u-displayFlex pr-u-gap100 pr-u-flexDirectionColumn">
						@for (row of panelInputs(); track row.cultureCode) {
							<ng-template #prefixLang>
								<div class="textField-prefix-lang">
									<!-- TODO required -->
									@if (true) {
										{{ row.cultureCode.slice(0, 2).toUpperCase() }}<sup class="formLabel-required" aria-hidden="true">*</sup>
									} @else {
										{{ row.cultureCode.slice(0, 2).toUpperCase() }}
									}
								</div>
							</ng-template>
							<ng-template #suffixIA>
								<!-- TODO trad -->
								<!-- TODO output -->
								<button
									type="button"
									[size]="formFieldSize() === 'S' ? 'XS' : 'S'"
									luButton="AI"
									[luTooltip]="'Traduire avec l’assistant IA'"
									luTooltipOnlyForDisplay
									[disabled]="disabledInternal()"
								>
									<lu-icon icon="officePenStar" alt="Traduire avec l’assistant IA" />
								</button>
							</ng-template>
							<!-- TODO label -->
							<lu-form-field
								[size]="formFieldSize()"
								[label]="intl().translateTo | intlParams: { lang: getLocaleDisplayName(row.cultureCode) }"
								hiddenLabel
							>
								<!-- TODO suffix -->
								<!-- TODO required -->
								<lu-text-input
									[prefix]="{ content: prefixLang, ariaLabel: '' }"
									[(ngModel)]="row.value"
									(ngModelChange)="valueChange()"
									[ngModelOptions]="{ standalone: true }"
									[disabled]="disabledInternal()"
									[autocomplete]="autocomplete()"
									[suffix]="{ content: suffixIA, ariaLabel: '' }"
								/>
							</lu-form-field>
						}
					</div>
				</div>
			</ng-template>
		</div>
	</div>
</div>
<ng-container *luPresentationDisplayDefault>
	@if (presentationValue()) {
		{{ presentationValue() }}
	} @else {
		<span aria-hidden="true" data-content-before="–"></span>
	}
</ng-container>
