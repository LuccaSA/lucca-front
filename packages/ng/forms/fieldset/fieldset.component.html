<fieldset
	class="fieldset"
	[attr.aria-labelledby]="id"
	[class.mod-expandable]="expandable()"
	[class.mod-horizontal]="horizontal()"
	[class.mod-S]="size() === 'S'"
	[class.mod-hiddenLegend]="hiddenLegend()"
>
	<legend class="fieldset-title">
		@if (expandable()) {
			<button
				type="button"
				class="fieldset-title-content"
				[attr.id]="id"
				[attr.aria-expanded]="expanded()"
				(click)="expanded.set(!expanded())"
			>
				<ng-container *ngTemplateOutlet="titleContent" />
				<span luButton="ghost" size="S"><lu-icon icon="arrowChevronBottom" /></span>
			</button>
		} @else if (action(); as action) {
			<span class="fieldset-title-content">
				<span class="pr-u-displayFlex" [attr.id]="id">
					<ng-container *ngTemplateOutlet="titleContent" />
				</span>
				<div class="fieldset-title-content-action">
					<ng-container *luPortal="action" />
				</div>
			</span>
		} @else {
			<span class="fieldset-title-content" [attr.id]="id">
				<ng-container *ngTemplateOutlet="titleContent" />
			</span>
		}
	</legend>
	<div class="fieldset-content" [attr.hidden]="!expandable() || expanded() ? null : 'hidden'"><ng-content /></div>
</fieldset>

<ng-template #titleContent>
	<span class="fieldset-title-content-text">
		@if (heading(); as heading) {
			<ng-container *luPortal="heading" />
		}
		@if (helper(); as helper) {
			<span class="fieldset-title-content-text-helper"><ng-container *luPortal="helper" /></span>
		}
	</span>
</ng-template>
