<label class="formLabel" for="{{id}}-input" id="{{id}}-label">
	<ng-content></ng-content>
</label>
<span class="radioField">
	<input
		[attr.disabled]="(formControl.disabled || disabled) ? 'disabled' : null"
		[attr.name]="name"
		[formControl]="formControl"
		[value]="value"
		attr.aria-describedby="{{id}}-message"
		attr.aria-labelledby="{{id}}-label"
		class="radioField-input"
		id="{{id}}-input"
		luInput
		luInputStandalone
		type="radio"
	/>
	<span aria-hidden="true" class="radioField-icon">
		<span class="radioField-icon-check"></span>
	</span>
</span>
@if (inlineMessage) {
<lu-inline-message [label]="inlineMessage" id="{{id}}-message"></lu-inline-message>
}
