<div class="form-field skeleton is-loading" [class.mod-dark]="dark()" [class]="size() ? 'mod-' + size() : null" inert="inert">
	@if (!hiddenLabel()) {
		<span
			class="skeleton-item"
			[class]="size() ? 'pr-u-body' + size() : null"
			[class.mod-dark]="dark()"
			[style.--components-skeleton-text-width]="getRandomPercent()"
		></span>
	}
	<div class="textField">
		<div class="textField-input">
			<span class="textField-input-value">
				@for (line of lines(); track $index) {
					<span
						class="skeleton-item"
						[class]="size() ? 'pr-u-body' + size() : null"
						[style.--components-skeleton-text-width]="$last ? getRandomPercent() : getRandomPercent(98, 100)"
					></span>
				}
			</span>
		</div>
	</div>
</div>
