<section
	[attr.role]="title ? null : 'presentation'"
	[style.--components-emptyState-background-color]="contentBackgroundColor"
	class="emptyState mod-page"
	style.--components-emptyState-illustration-background-bottom-left="url({{bottomLeftBackground}})"
	style.--components-emptyState-illustration-background-top-right="url({{topRightBackground}})"
	style.--components-emptyState-illustration-foreground-bottom-left="url({{bottomLeftForeground}})"
	style.--components-emptyState-illustration-foreground-top-right="url({{topRightForeground}})"
>
	<div class="emptyState-container">
		<div class="emptyState-content">
			@if (icon) {
			<div class="emptyState-content-icon" aria-hidden="true" [innerHtml]="icon | luSafeExternalSvg"></div>
			}
			<div class="emptyState-content-text">
				@if (title) {
				<div role="heading" [attr.aria-level]="hx" class="emptyState-content-heading">{{ title }}</div>
				} @if (description) {
				<p class="emptyState-content-description">
					<ng-container *luPortal="description"></ng-container>
				</p>
				}
				<div class="emptyState-actions">
					<ng-content></ng-content>
				</div>
			</div>
		</div>
	</div>
</section>
