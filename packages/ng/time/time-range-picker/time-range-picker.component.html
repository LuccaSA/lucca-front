<div class="timePicker" [class.mod-stepper]="displayArrows()">
	<div class="timePicker-fieldset">
		<lu-time-picker
			#timePickerStart
			[label]="`${formFieldLabel()} (${intl().timeRangePickerStart})`"
			[value]="startValue()"
			(valueChange)="onStartChange($event)"
			[disabled]="isDisabled()"
			[max]="max()"
			[step]="step()"
			[size]="size()"
			[displayArrows]="displayArrows()"
			[forceMeridiemDisplay]="forceMeridiemDisplay()"
			(blur)="onTouched()"
			(nextPicker)="timePickerEnd.focusPart('hours')"
		/>
		<label role="presentation" [attr.for]="timePickerEnd?.firstTimePickerInputId" class="timePicker-arrow">
			<lu-icon class="timePicker-arrow-icon" icon="arrowRight" />
		</label>
		<lu-time-picker
			#timePickerEnd
			[label]="`${formFieldLabel()} (${intl().timeRangePickerEnd})`"
			[value]="endValue()"
			(valueChange)="onEndChange($event)"
			[disabled]="isDisabled()"
			[max]="max()"
			[step]="step()"
			[size]="size()"
			[displayArrows]="displayArrows()"
			[forceMeridiemDisplay]="forceMeridiemDisplay()"
			(blur)="onTouched()"
			(prevPicker)="timePickerStart.focusPart(partToFocus())"
		/>
	</div>
</div>
