<div
	class="timePicker"
	[class.mod-stepper]="displayArrows()"
	[class.pr-u-animatedShake]="keyPressed()"
	(animationend)="keyPressed.set(false)"
>
	<div class="timePicker-fieldset">
		<lu-time-picker
			#timePickerStart
			[label]="`${formFieldLabel() ? formFieldLabel() + ' ' : ''}(${intl().timeRangePickerStart})`"
			[value]="startValue()"
			(valueChange)="onStartChange($event)"
			[disabled]="isDisabled()"
			[max]="max()"
			[step]="step()"
			[size]="size()"
			[displayArrows]="displayArrows()"
			[forceMeridiemDisplay]="forceMeridiemDisplay()"
			(blur)="onTouched()"
			(nextPicker)="timePickerEnd.focusPart('hours')"
			(nonDigitKeyPressed)="keyPressed.set(true)"
		/>
		<label role="presentation" [attr.for]="timePickerEnd?.firstTimePickerInputId" class="timePicker-arrow">
			<lu-icon class="timePicker-arrow-icon" icon="arrowRight" />
		</label>
		<lu-time-picker
			#timePickerEnd
			[label]="`${formFieldLabel() ? formFieldLabel() + ' ' : ''}(${intl().timeRangePickerEnd})`"
			[value]="endValue()"
			(valueChange)="onEndChange($event)"
			[disabled]="isDisabled()"
			[max]="max()"
			[step]="step()"
			[size]="size()"
			[displayArrows]="displayArrows()"
			[forceMeridiemDisplay]="forceMeridiemDisplay()"
			(blur)="onTouched()"
			(prevPicker)="timePickerStart.focusPart(partToFocus())"
			(nonDigitKeyPressed)="keyPressed.set(true)"
		/>
	</div>
</div>
