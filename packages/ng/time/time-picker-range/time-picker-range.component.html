<div class="timePicker">
	<div class="timePicker-fieldset">
		<lu-time-picker
			#timePickerStart
			[label]="`${label()} (${intl().timePickerRangeStart})`"
			[value]="startValue()"
			(valueChange)="onStartChange($event)"
			[disabled]="disabled()"
			[max]="max()"
			[step]="step()"
			[size]="size()"
			[displayArrows]="displayArrows()"
			[forceMeridiemDisplay]="forceMeridiemDisplay()"
			(blur)="onTouched()"
		/>
		<label role="presentation" for="TODO-end-hour-input" class="timePicker-arrow">
			<lu-icon class="timePicker-arrow-icon" icon="arrowRight" />
		</label>
		<lu-time-picker
			#timePickerEnd
			[label]="`${label()} (${intl().timePickerRangeEnd})`"
			[value]="endValue()"
			(valueChange)="onEndChange($event)"
			[disabled]="disabled()"
			[max]="max()"
			[step]="step()"
			[size]="size()"
			[displayArrows]="displayArrows()"
			[forceMeridiemDisplay]="forceMeridiemDisplay()"
			(blur)="onTouched()"
		/>
	</div>
</div>
