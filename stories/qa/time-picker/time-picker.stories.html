<table class="demo-QAtable">
	<tbody>
		<tr>
			<td></td>
			<td>
				<div class="demo-QAtable-list">Angular</div>
			</td>
		</tr>
		<tr>
			<td>Empty Model</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="emptyTime" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Filled Model</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="filledTime" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Empty Form</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [formControl]="emptyTimeControl" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Filled Form</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [formControl]="filledTimeControl" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Size</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="emptyTime" size="S" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Disabled</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="emptyTime" disabled />
				</lu-form-field>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="filledTime" disabled />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Display Arrows</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="emptyTime" displayArrows />
				</lu-form-field>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="filledTime" displayArrows />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Meridiem Display</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="emptyTime" [forceMeridiemDisplay]="true" />
				</lu-form-field>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-time-picker [(ngModel)]="filledTime" [forceMeridiemDisplay]="true" />
				</lu-form-field>
			</td>
		</tr>
	</tbody>
</table>

<!-- To tell the ui-diff tool that the page has finished rendering -->
<span id="ready"></span>
