<table class="demo-QAtable">
	<tbody>
		<tr>
			<td></td>
			<td style="width: 50%">
				<div class="demo-QAtable-list">HTML</div>
			</td>
			<td style="width: 50%">
				<div class="demo-QAtable-list">Angular</div>
			</td>
		</tr>
		<tr>
			<td>Default</td>
			<td>
				<div class="demo-QAtable-list">
					<fieldset class="form-fieldset">
						<legend class="formLabel">Label<sup class="formLabel-required" aria-hidden="true">*</sup></legend>
						<div class="form-field">
							<label class="formLabel" for="IDradioA1">Label A</label>
							<span class="radioField">
								<input
									type="radio"
									class="radioField-input"
									id="IDradioA1"
									name="radioName1"
									aria-describedby="IDmessageRadioA1"
									aria-required="true"
									checked
								/>
								<span class="radioField-icon" aria-hidden="true"><span class="radioField-icon-check"></span></span>
							</span>
							<div class="inlineMessage" id="IDmessageRadioA1">
								<p class="inlineMessage-content">Helper text</p>
							</div>
						</div>
						<div class="form-field">
							<label class="formLabel" for="IDradioB1">Label B</label>
							<span class="radioField">
								<input
									type="radio"
									class="radioField-input"
									id="IDradioB1"
									name="radioName1"
									aria-describedby="IDmessageRadioB1"
									aria-required="true"
								/>
								<span class="radioField-icon" aria-hidden="true"><span class="radioField-icon-check"></span></span>
							</span>
							<div class="inlineMessage" id="IDmessageRadioB1">
								<p class="inlineMessage-content">Helper text</p>
							</div>
						</div>
					</fieldset>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-form-field label="Label" required>
						<lu-radio-group-input [(ngModel)]="radioDefault">
							<lu-radio value="A" inlineMessage="Helper text">Label A</lu-radio>
							<lu-radio value="B" inlineMessage="Helper text">Label B</lu-radio>
						</lu-radio-group-input>
					</lu-form-field>
				</div>
			</td>
		</tr>
		<tr>
			<td>Small</td>
			<td>
				<div class="demo-QAtable-list">
					<fieldset class="form-fieldset">
						<legend class="formLabel">Label<sup class="formLabel-required" aria-hidden="true">*</sup></legend>
						<div class="form-field mod-S">
							<label class="formLabel" for="IDradioA2">Label A</label>
							<span class="radioField">
								<input
									type="radio"
									class="radioField-input"
									id="IDradioA2"
									name="radioName2"
									aria-describedby="IDmessageRadioA2"
									aria-required="true"
									checked
								/>
								<span class="radioField-icon" aria-hidden="true"><span class="radioField-icon-check"></span></span>
							</span>
							<div class="inlineMessage" id="IDmessageRadioA2">
								<p class="inlineMessage-content">Helper text</p>
							</div>
						</div>
						<div class="form-field mod-S">
							<label class="formLabel" for="IDradioB2">Label B</label>
							<span class="radioField">
								<input
									type="radio"
									class="radioField-input"
									id="IDradioB2"
									name="radioName2"
									aria-describedby="IDmessageRadioB2"
									aria-required="true"
								/>
								<span class="radioField-icon" aria-hidden="true"><span class="radioField-icon-check"></span></span>
							</span>
							<div class="inlineMessage" id="IDmessageRadioB2">
								<p class="inlineMessage-content">Helper text</p>
							</div>
						</div>
					</fieldset>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-form-field label="Label" required size="S">
						<lu-radio-group-input [(ngModel)]="radioSmall" size="S">
							<lu-radio value="A" inlineMessage="Helper text">Label A</lu-radio>
							<lu-radio value="B" inlineMessage="Helper text">Label B</lu-radio>
						</lu-radio-group-input>
					</lu-form-field>
				</div>
			</td>
		</tr>
		<tr>
			<td>Disabled</td>
			<td>
				<div class="demo-QAtable-list">
					<fieldset class="form-fieldset">
						<legend class="formLabel">Label<sup class="formLabel-required" aria-hidden="true">*</sup></legend>
						<div class="form-field">
							<label class="formLabel" for="IDradioA3">Label A</label>
							<span class="radioField">
								<input
									disabled="disabled"
									type="radio"
									class="radioField-input"
									id="IDradioA3"
									name="radioName3"
									aria-describedby="IDmessageRadioA3"
									aria-required="true"
									checked
								/>
								<span class="radioField-icon" aria-hidden="true"><span class="radioField-icon-check"></span></span>
							</span>
							<div class="inlineMessage" id="IDmessageRadioA3">
								<p class="inlineMessage-content">Helper text</p>
							</div>
						</div>
						<div class="form-field">
							<label class="formLabel" for="IDradioB3">Label B</label>
							<span class="radioField">
								<input
									disabled="disabled"
									type="radio"
									class="radioField-input"
									id="IDradioB3"
									name="radioName3"
									aria-describedby="IDmessageRadioB3"
									aria-required="true"
								/>
								<span class="radioField-icon" aria-hidden="true"><span class="radioField-icon-check"></span></span>
							</span>
							<div class="inlineMessage" id="IDmessageRadioB3">
								<p class="inlineMessage-content">Helper text</p>
							</div>
						</div>
					</fieldset>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-form-field label="Label" required>
						<lu-radio-group-input [(ngModel)]="radioDisabled">
							<lu-radio value="A" inlineMessage="Helper text" disabled>Label A</lu-radio>
							<lu-radio value="B" inlineMessage="Helper text" disabled>Label B</lu-radio>
						</lu-radio-group-input>
					</lu-form-field>
				</div>
			</td>
		</tr>
		<tr>
			<td>Error</td>
			<td>
				<div class="demo-QAtable-list">
					<fieldset class="form-fieldset">
						<legend class="formLabel">Label<sup class="formLabel-required" aria-hidden="true">*</sup></legend>
						<div class="form-field">
							<label class="formLabel" for="IDradioA4">Label A</label>
							<span class="radioField">
								<input
									aria-invalid="true"
									type="radio"
									class="radioField-input"
									id="IDradioA4"
									name="radioName4"
									aria-describedby="IDmessageRadioA4"
									aria-required="true"
									checked
								/>
								<span class="radioField-icon" aria-hidden="true"><span class="radioField-icon-check"></span></span>
							</span>
							<div class="inlineMessage" id="IDmessageRadioA4">
								<p class="inlineMessage-content">Helper text</p>
							</div>
						</div>
						<div class="form-field">
							<label class="formLabel" for="IDradioB4">Label B</label>
							<span class="radioField">
								<input
									aria-invalid="true"
									type="radio"
									class="radioField-input"
									id="IDradioB4"
									name="radioName4"
									aria-describedby="IDmessageRadioB4"
									aria-required="true"
								/>
								<span class="radioField-icon" aria-hidden="true"><span class="radioField-icon-check"></span></span>
							</span>
							<div class="inlineMessage" id="IDmessageRadioB4">
								<p class="inlineMessage-content">Helper text</p>
							</div>
						</div>
					</fieldset>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-form-field label="Label" required invalid>
						<lu-radio-group-input [(ngModel)]="radioError">
							<lu-radio value="A" inlineMessage="Helper text">Label A</lu-radio>
							<lu-radio value="B" inlineMessage="Helper text">Label B</lu-radio>
						</lu-radio-group-input>
					</lu-form-field>
				</div>
			</td>
		</tr>
	</tbody>
</table>

<!-- To tell the ui-diff tool that the page has finished rendering -->
<span id="ready"></span>
