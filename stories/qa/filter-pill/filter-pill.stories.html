<table class="demo-QAtable">
	<tbody>
		<tr>
			<td></td>
			<td>
				<div class="demo-QAtable-list">Angular</div>
			</td>
			<td>
				<div class="demo-QAtable-list">Angular selected</div>
			</td>
			<td>
				<div class="demo-QAtable-list">Angular selected clearable</div>
			</td>
		</tr>
		<tr>
			<td>Checkbox</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Arroser">
						<lu-checkbox-input [ngModel]="false" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<lu-filter-pill label="Arroser">
					<lu-checkbox-input [ngModel]="true" />
				</lu-filter-pill>
			</td>
			<td></td>
		</tr>
		<tr>
			<td>Select simple</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légume">
						<lu-simple-select [ngModel]="null" clearable="false" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légume">
						<lu-simple-select [ngModel]="'Artichaut'" clearable="false" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légume">
						<lu-simple-select [ngModel]="'Artichaut'" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
		</tr>
		<tr>
			<td>Select multi</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légumes">
						<lu-multi-select [ngModel]="[]" clearable="false" filterPillLabelPlural="légumes" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légumes">
						<lu-multi-select [ngModel]="['Artichaut']" clearable="false" filterPillLabelPlural="légumes" [options]="legumes" />
					</lu-filter-pill>
					<lu-filter-pill label="Légumes">
						<lu-multi-select [ngModel]="['Artichaut', 'Asperge']" clearable="false" filterPillLabelPlural="légumes" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légumes">
						<lu-multi-select [ngModel]="['Artichaut']" filterPillLabelPlural="légumes" [options]="legumes" />
					</lu-filter-pill>
					<lu-filter-pill label="Légumes">
						<lu-multi-select [ngModel]="['Artichaut', 'Asperge']" filterPillLabelPlural="légumes" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
		</tr>
		<tr>
			<td>Tree select simple</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légume">
						<lu-simple-select [ngModel]="null" clearable="false" [treeSelect]="groupingFn" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légume">
						<lu-simple-select [ngModel]="'Artichaut'" clearable="false" [treeSelect]="groupingFn" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légume">
						<lu-simple-select [ngModel]="'Artichaut'" [treeSelect]="groupingFn" [options]="legumes" />
					</lu-filter-pill>
				</div>
			</td>
		</tr>
		<tr>
			<td>Tree select multi</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légumes">
						<lu-multi-select
							[ngModel]="[]"
							clearable="false"
							filterPillLabelPlural="légumes"
							[treeSelect]="groupingFn"
							[options]="legumes"
						/>
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légumes">
						<lu-multi-select
							[ngModel]="['Artichaut']"
							clearable="false"
							filterPillLabelPlural="légumes"
							[treeSelect]="groupingFn"
							[options]="legumes"
						/>
					</lu-filter-pill>
					<lu-filter-pill label="Légumes">
						<lu-multi-select
							[ngModel]="['Artichaut', 'Asperge']"
							clearable="false"
							filterPillLabelPlural="légumes"
							[treeSelect]="groupingFn"
							[options]="legumes"
						/>
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Légumes">
						<lu-multi-select [ngModel]="['Artichaut']" filterPillLabelPlural="légumes" [treeSelect]="groupingFn" [options]="legumes" />
					</lu-filter-pill>
					<lu-filter-pill label="Légumes">
						<lu-multi-select
							[ngModel]="['Artichaut', 'Asperge']"
							filterPillLabelPlural="légumes"
							[treeSelect]="groupingFn"
							[options]="legumes"
						/>
					</lu-filter-pill>
				</div>
			</td>
		</tr>
		<tr>
			<td>Departement simple</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Département" name="department">
						<lu-simple-select [ngModel]="null" clearable="false" departments />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Département" name="department">
						<lu-simple-select [ngModel]="selectedDepartment" clearable="false" departments />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Département" name="department">
						<lu-simple-select [ngModel]="selectedDepartment" departments />
					</lu-filter-pill>
				</div>
			</td>
		</tr>
		<tr>
			<td>Departement multi</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Départements" name="departments">
						<lu-multi-select [ngModel]="[]" clearable="false" filterPillLabelPlural="départements" departments />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Départements" name="departments">
						<lu-multi-select [ngModel]="[selectedDepartment]" clearable="false" filterPillLabelPlural="départements" departments />
					</lu-filter-pill>
					<lu-filter-pill label="Départements" name="departments">
						<lu-multi-select [ngModel]="selectedDepartments" clearable="false" filterPillLabelPlural="départements" departments />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Départements" name="departments">
						<lu-multi-select [ngModel]="[selectedDepartment]" filterPillLabelPlural="départements" departments />
					</lu-filter-pill>
					<lu-filter-pill label="Départements" name="departments">
						<lu-multi-select [ngModel]="selectedDepartments" filterPillLabelPlural="départements" departments />
					</lu-filter-pill>
				</div>
			</td>
		</tr>
		<tr>
			<td>Date</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Date de début">
						<lu-date-input [ngModel]="null" clearable="false" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Date de début">
						<lu-date-input [ngModel]="selectedDate" clearable="false" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Date de début">
						<lu-date-input [ngModel]="selectedDate" />
					</lu-filter-pill>
				</div>
			</td>
		</tr>
		<tr>
			<td>Period</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Période">
						<lu-date-range-input [ngModel]="null" clearable="false" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Période">
						<lu-date-range-input [ngModel]="selectedDateRange" clearable="false" />
					</lu-filter-pill>
				</div>
			</td>
			<td>
				<div class="demo-QAtable-list">
					<lu-filter-pill label="Période">
						<lu-date-range-input [ngModel]="selectedDateRange" />
					</lu-filter-pill>
				</div>
			</td>
		</tr>
	</tbody>
</table>

<!-- To tell the ui-diff tool that the page has finished rendering -->
<span id="ready"></span>
