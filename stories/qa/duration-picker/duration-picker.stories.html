<table class="demo-QAtable">
	<tbody>
		<tr>
			<td></td>
			<td>
				<div class="demo-QAtable-list">Angular</div>
			</td>
		</tr>
		<tr>
			<td>Empty Model</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [(ngModel)]="emptyDuration" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Filled Model</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [(ngModel)]="filledDuration" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Empty Form</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [formControl]="emptyDurationControl" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Filled Form</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [formControl]="filledDurationControl" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Filled Form 1000h</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [formControl]="filledDuration1000hControl" max="PT9999H" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Size</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [(ngModel)]="emptyDuration" size="S" />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Disabled</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [(ngModel)]="emptyDuration" disabled />
				</lu-form-field>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [(ngModel)]="filledDuration" disabled />
				</lu-form-field>
			</td>
		</tr>
		<tr>
			<td>Display Arrows</td>
			<td>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [(ngModel)]="emptyDuration" displayArrows />
				</lu-form-field>
				<lu-form-field label="Label" tooltip="Tooltip message" inlineMessage="Helper text" inlineMessageState="default">
					<lu-duration-picker [(ngModel)]="filledDuration" displayArrows />
				</lu-form-field>
			</td>
		</tr>
	</tbody>
</table>

<!-- To tell the ui-diff tool that the page has finished rendering -->
<span id="ready"></span>
