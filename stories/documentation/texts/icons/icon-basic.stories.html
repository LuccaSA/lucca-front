<div class="textfield mod-outlined mod-search pr-u-marginBottom300">
	<span class="textfield-label">Rechercher une icône</span>
	<input (ngModelChange)="updateIcons($event)" [(ngModel)]="filter" class="textfield-input" type="text" />
</div>

<input class="showDeprecated pr-u-marginBottom300" id="showDeprecatedIcons" type="checkbox" />
<label for="showDeprecatedIcons"> Afficher les icônes dépréciées</label>

<div class="icons">
	@for (icon of icons; track icon) {
	<div class="demo-icon" (click)="copyIcon(icon.icon)">
		<span aria-hidden="true" class="lucca-icon icon-{{icon.icon}}" [class.deprecated]="icon.deprecated"></span>
		<code class="code">icon-{{ icon.icon }}</code>
	</div>
	}
</div>

<style>
	.demo-icon {
		width: 33%;
		float: left;
		cursor: pointer;
	}
</style>
