name: Deploy Storybook & Compodoc

on:
  push:
    branches:
      - master
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-**'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy-path: ${{ steps.vars.outputs.deploy-path }}
      storybook-url: ${{ steps.vars.outputs.storybook-url }}
    steps:
      - id: vars
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            DEPLOY_PATH="PR-${{ github.event.number }}"
          else
            DEPLOY_PATH="${{ github.ref_name }}"
          fi
          echo "deploy-path=$DEPLOY_PATH" >> $GITHUB_OUTPUT
          echo "storybook-url=https://lucca-front.lucca.tech/$DEPLOY_PATH/storybook" >> $GITHUB_OUTPUT

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 24.13.0

      - run: npm ci
      - run: npm run build-storybook -- --quiet
      - run: npm run build-compodoc

      - uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
      - uses: actions/upload-artifact@v4
        with:
          name: compodoc-static
          path: compodoc-static/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
      AWS_DEFAULT_REGION: auto
      R2_ENDPOINT: https://pub-7f91998ed2f44626b0bae9020a095f27.r2.dev
      DEPLOY_PATH: ${{ needs.build.outputs.deploy-path }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: storybook-static

      - uses: actions/download-artifact@v4
        with:
          name: compodoc-static
          path: compodoc-static

      - name: Deploy Storybook
        run: |
          aws s3 sync storybook-static/ s3://lucca-front/$DEPLOY_PATH/storybook/ \
            --endpoint-url $R2_ENDPOINT --delete

      - name: Deploy Compodoc
        run: |
          aws s3 sync compodoc-static/ s3://lucca-front/$DEPLOY_PATH/compodoc/ \
            --endpoint-url $R2_ENDPOINT --delete

      - name: Deploy to major.minor alias (release tags only)
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && !contains(github.ref_name, '-')
        run: |
          VERSION_PREFIX=$(echo "${{ github.ref_name }}" | grep -oP '^v\d+\.\d+')
          aws s3 sync storybook-static/ s3://lucca-front/$VERSION_PREFIX/storybook/ \
            --endpoint-url $R2_ENDPOINT --delete
          aws s3 sync compodoc-static/ s3://lucca-front/$VERSION_PREFIX/compodoc/ \
            --endpoint-url $R2_ENDPOINT --delete

  comment-pr:
    needs: [build, deploy]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: ':woman_cook: ${{ needs.build.outputs.storybook-url }}'
            })
