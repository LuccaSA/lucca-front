name: Deploy Lucca Front

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or branch to deploy (e.g. v21.1.3 or master)'
        required: true
        default: master

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Lucca Front staging
    environment: production
    permissions:
      contents: read
    outputs:
      deploy-path: ${{ steps.vars.outputs.deploy-path }}

    env:
      R2_ENDPOINT: ${{ vars.CLOUDFLARE_R2_ENDPOINT }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
      R2_PUBLIC_DOMAIN: ${{ vars.R2_PUBLIC_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          # On manual runs, check out the tag/branch the user typed.
          # On push events, inputs.ref is empty -> checkout uses the triggering ref.
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 24.13.0

      - name: Compute deploy path
        id: vars
        run: |
          # Manual run: use the typed input. Push: strip refs/tags|heads/ prefix.
          RAW="${{ github.event.inputs.ref }}"
          if [ -z "$RAW" ]; then
            RAW="${GITHUB_REF#refs/*/}"          # refs/tags/v21.1.3 -> v21.1.3 ; refs/heads/master -> master
          fi

          if [[ "$RAW" =~ ^v[0-9]+\.[0-9]+ ]]; then
            SLUG="$(echo "$RAW" | grep -oE '^v[0-9]+\.[0-9]+')"   # v21.1.3 / v21.1.3-beta -> v21.1
          else
            SLUG="$RAW"                                           # branch name, e.g. master
          fi

          echo "deploy-path=${SLUG}/storybook" >> "$GITHUB_OUTPUT"
          echo "Deploying ref '${RAW}' to: ${SLUG}/storybook"

      - run: npm ci
      - run: npm run build-storybook

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = $R2_ENDPOINT
          acl = private
          no_check_bucket = true
          EOF

      - name: Upload results to R2
        run: |
          rclone sync ./storybook-static/ "r2:${R2_BUCKET}/${{ steps.vars.outputs.deploy-path }}" --fast-list --checksum --transfers 8 --checkers 8
