name: Deploy Storybook & Compodoc

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      deploy-path: ${{ steps.vars.outputs.deploy-path }}
      major-minor: ${{ steps.vars.outputs.major-minor }}
    steps:
      - id: vars
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            DEPLOY_PATH="PR-${{ github.event.number }}"
          else
            DEPLOY_PATH="${{ github.ref_name }}"
          fi
          echo "deploy-path=$DEPLOY_PATH" >> $GITHUB_OUTPUT
          # Compute vX.Y alias only for non-pre-release tags (vX.Y.Z with no suffix)
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "major-minor=$(echo "${{ github.ref_name }}" | grep -oP '^v\d+\.\d+')" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 24.13.0

      - run: npm ci
      - run: npm run build-storybook -- --quiet
      - run: npm run build-compodoc

      - uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
      - uses: actions/upload-artifact@v4
        with:
          name: compodoc-static
          path: compodoc-static/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: storybook-static
          path: deploy/storybook

      - uses: actions/download-artifact@v4
        with:
          name: compodoc-static
          path: deploy/compodoc

      - name: Publish to Cloudflare Pages
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_KEY }}
          r2-bucket: https://pub-7f91998ed2f44626b0bae9020a095f27.r2.dev
          source-dir: storybook-static/
          destination-dir: ./${{steps.vars.outputs.deploy-path}}
          keep-file-fresh: true

      - name: Publish major.minor alias (release tags only)
        if: needs.build.outputs.major-minor != ''
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_KEY }}
          r2-bucket: https://pub-7f91998ed2f44626b0bae9020a095f27.r2.dev
          source-dir: storybook-static/
          destination-dir: ./${{steps.vars.outputs.deploy-path}}
