name: Deploy Lucca Front

on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Lucca Front staging
    environment: production
    permissions:
      contents: read

    env:
      R2_ENDPOINT: ${{ vars.CLOUDFLARE_R2_ENDPOINT }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_KEY }}
      R2_PUBLIC_DOMAIN: ${{ vars.R2_PUBLIC_DOMAIN }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 24.13.0

      - run: npm ci
      - run: npm run build-storybook

      - name: Install rclone
        run: |
          sudo apt-get update
          sudo apt-get install -y rclone

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          cat > ~/.config/rclone/rclone.conf << EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = $R2_ENDPOINT
          acl = private
          no_check_bucket = true
          EOF

      - name: Upload results to R2
        run: |
          rclone sync ./storybook-static/ "r2:${R2_BUCKET}/storybook" --fast-list --checksum --transfers 8 --checkers 8
