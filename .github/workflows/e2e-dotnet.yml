name: E2E Tests (.NET)

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: mcr.microsoft.com/playwright@sha256:8a0360d39d1973be506dd59002904a774f6d697d4946c94063b3fd006461c8ff # v1.59.1-jammy
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 24.13.0

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook -- --quiet

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Authenticate GitHub NuGet feed
        run: dotnet nuget update source github --username ${{ github.actor }} --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text
        working-directory: e2e

      - name: Restore .NET dependencies
        run: dotnet restore LuccaFront.e2e.sln
        working-directory: e2e

      - name: Enable headless mode
        run: |
          echo '{"instanceUrl":"http://localhost:6006/","referenceUrl":"http://localhost:6006/","headless":"true"}' \
            > e2e/LuccaFront.Tests.e2e/testSettings.json

      - name: Build .NET E2E project
        run: dotnet build LuccaFront.e2e.sln --no-restore
        working-directory: e2e

      - name: Serve Storybook and run .NET E2E tests
        run: |
          npx http-server storybook-static --port 6006 --silent &
          npx wait-on tcp:127.0.0.1:6006
          xvfb-run --auto-servernum -- dotnet test e2e/LuccaFront.e2e.sln
