name: Build, lint and test
on:
  - push
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 24.13.0
      - run: npm install
      - run: npm run build --if-present
      - run: npm run ci-test
      - run: npm run lint
  run-qa:
    if: ${{github.ref_type == 'tag'}}
    uses: LuccaSA/actions/.github/workflows/lucca-ci.yml@b38408be3513da8b7cdd4ffc8a3c3deb9cb15224 # v2.7.4
    needs: [build]
    with:
      cake-file: .cd/qa/run.cake
      runs-on: ${{ github.event.inputs.runs-on || vars.CI_RUNNER || vars.DEFAULT_CI_RUNNER }}
    secrets: inherit