name: Build, lint and test
on:
  - push
jobs:
  lockfile-check:
    name: Lockfile integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version-file: 'package.json'
      - run: npm ci --ignore-scripts
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
      - name: Use Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: 24.15.0
      - run: npm install
      - run: npm run build --if-present
      - run: npm run ci-test
      - run: npm run lint
      # LLM/API doc surface: generate + smoke, then gate JSDoc coverage. The
      # extraction reads TypeScript source (no Storybook build needed), so this is
      # a fast offline gate. Unit tests run in the `api-docs` vitest project (ci-test).
      - run: npm run docs:api
      - run: npm run docs:api-coverage